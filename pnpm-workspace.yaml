# Hardening supply-chain (richiesto da react-doctor/require-pnpm-hardening):
# - minimumReleaseAge: ritarda l'installazione di versioni pubblicate da meno di
#   7 giorni (10080 minuti), il tempo perché eventuale malware venga individuato.
# - trustPolicy no-downgrade: rifiuta pacchetti i cui segnali di fiducia
#   (provenance, firme) peggiorano tra un aggiornamento e l'altro.
packages:
  - '.'
minimumReleaseAge: 10080
minimumReleaseAgeStrict: true
minimumReleaseAgeIgnoreMissingTime: false
trustPolicy: no-downgrade
# Versione transitiva legacy di Babel, pubblicata prima dell'adozione stabile
# della provenance; l'eccezione è limitata alla sola release richiesta.
trustPolicyExclude:
  - 'semver@6.3.1'
# false fa verificare le policy anche quando l'installazione usa il lockfile.
trustLockfile: false
